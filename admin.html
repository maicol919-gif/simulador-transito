<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — Simulador Examen Teórico</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0f1a;
    --surface: #111827;
    --surface2: #1a2332;
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.18);
    --accent: #3b82f6;
    --accent-dim: rgba(59,130,246,0.15);
    --accent-glow: rgba(59,130,246,0.3);
    --green: #10b981;
    --green-dim: rgba(16,185,129,0.15);
    --red: #ef4444;
    --red-dim: rgba(239,68,68,0.15);
    --amber: #f59e0b;
    --amber-dim: rgba(245,158,11,0.15);
    --text: #f1f5f9;
    --text-muted: #64748b;
    --text-dim: #94a3b8;
    --font: 'DM Sans', sans-serif;
    --mono: 'DM Mono', monospace;
    --radius: 12px;
    --radius-lg: 18px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 2rem 1.5rem;
  }

  body::before {
    content: '';
    position: fixed;
    top: -200px; right: -200px;
    width: 500px; height: 500px;
    background: radial-gradient(circle, rgba(59,130,246,0.05) 0%, transparent 70%);
    pointer-events: none;
  }

  .container { max-width: 760px; margin: 0 auto; }

  .top-bar {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 2rem;
  }
  .brand {
    display: flex; align-items: center; gap: 10px;
    font-size: 15px; font-weight: 500;
  }
  .brand-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 8px var(--accent-glow);
    animation: pulse 2s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

  .admin-badge {
    font-size: 11px; font-weight: 500; color: var(--amber);
    background: var(--amber-dim); border: 1px solid rgba(245,158,11,0.3);
    border-radius: 999px; padding: 3px 10px;
  }

  h1 { font-size: 24px; font-weight: 600; margin-bottom: 4px; letter-spacing: -0.5px; }
  .page-sub { font-size: 14px; color: var(--text-muted); margin-bottom: 2rem; }

  /* FORM */
  .form-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.5rem;
    margin-bottom: 1.5rem;
  }

  .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
  .form-group { display: flex; flex-direction: column; gap: 6px; }
  .form-group.full { grid-column: 1 / -1; }

  label {
    font-size: 12px; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1px;
  }

  input, select {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 11px 14px;
    font-family: var(--font); font-size: 15px;
    color: var(--text);
    outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
    width: 100%;
  }
  input:focus, select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-dim);
  }
  input::placeholder { color: var(--text-muted); }
  select option { background: var(--surface2); }

  .btn-generate {
    width: 100%; padding: 13px;
    background: var(--accent); color: white;
    border: none; border-radius: var(--radius);
    font-family: var(--font); font-size: 15px; font-weight: 500;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center; gap: 8px;
    transition: background 0.2s, box-shadow 0.2s;
  }
  .btn-generate:hover { background: #2563eb; box-shadow: 0 4px 20px var(--accent-glow); }
  .btn-generate:disabled { opacity: 0.5; cursor: not-allowed; box-shadow: none; }

  /* RESULTADO */
  .result-box {
    background: var(--green-dim);
    border: 1px solid rgba(16,185,129,0.3);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1.5rem;
    display: none;
    animation: fadeIn 0.3s ease;
  }
  .result-box.show { display: block; }
  @keyframes fadeIn { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }

  .result-label { font-size: 12px; color: var(--green); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
  .result-name { font-size: 16px; font-weight: 500; margin-bottom: 12px; }

  .token-display {
    display: flex; align-items: center; gap: 10px;
    background: rgba(0,0,0,0.3); border-radius: var(--radius);
    padding: 12px 16px; margin-bottom: 12px;
  }
  .token-code {
    font-family: var(--mono); font-size: 24px; font-weight: 500;
    color: var(--green); letter-spacing: 3px; flex: 1;
  }
  .btn-copy {
    padding: 6px 14px;
    background: rgba(16,185,129,0.2); color: var(--green);
    border: 1px solid rgba(16,185,129,0.3); border-radius: 8px;
    font-family: var(--font); font-size: 13px; font-weight: 500;
    cursor: pointer; transition: background 0.2s; white-space: nowrap;
  }
  .btn-copy:hover { background: rgba(16,185,129,0.35); }

  .msg-template {
    background: var(--surface2); border-radius: var(--radius);
    padding: 12px 14px; font-size: 13px; color: var(--text-dim);
    line-height: 1.6; position: relative;
  }
  .msg-template strong { color: var(--text); }
  .btn-whatsapp {
    margin-top: 8px; padding: 10px 16px;
    background: #25D366; color: white;
    border: none; border-radius: 8px;
    font-family: var(--font); font-size: 14px; font-weight: 500;
    cursor: pointer; transition: background 0.2s;
    display: flex; align-items: center; gap: 8px; width: 100%;
    justify-content: center;
  }
  .btn-whatsapp:hover { background: #1da851; }

  /* TABLA */
  .table-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 1rem;
  }
  .table-title { font-size: 16px; font-weight: 500; }
  .btn-refresh {
    padding: 6px 14px;
    background: transparent; color: var(--text-muted);
    border: 1px solid var(--border); border-radius: 8px;
    font-family: var(--font); font-size: 13px;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 6px;
  }
  .btn-refresh:hover { border-color: var(--border-hover); color: var(--text); }

  .table-wrap {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    overflow: hidden;
  }

  table { width: 100%; border-collapse: collapse; }
  th {
    text-align: left; padding: 10px 16px;
    font-size: 11px; font-weight: 500; color: var(--text-muted);
    text-transform: uppercase; letter-spacing: 1px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
  }
  td {
    padding: 12px 16px; font-size: 14px;
    border-bottom: 1px solid var(--border);
    color: var(--text-dim);
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(255,255,255,0.02); }

  .td-nombre { color: var(--text); font-weight: 500; }
  .td-token { font-family: var(--mono); font-size: 13px; color: var(--accent); letter-spacing: 1px; }

  .nivel-badge {
    display: inline-flex; align-items: center; gap: 4px;
    font-size: 12px; padding: 2px 8px; border-radius: 999px;
  }
  .nivel-0 { background: var(--surface2); color: var(--text-muted); }
  .nivel-1 { background: var(--accent-dim); color: var(--accent); }
  .nivel-2 { background: var(--amber-dim); color: var(--amber); }
  .nivel-3 { background: var(--green-dim); color: var(--green); }

  .activo-dot {
    width: 7px; height: 7px; border-radius: 50%; display: inline-block; margin-right: 5px;
  }
  .activo-si { background: var(--green); }
  .activo-no { background: var(--red); }

  .btn-toggle {
    padding: 4px 10px; border-radius: 6px; font-size: 12px;
    cursor: pointer; border: 1px solid var(--border);
    background: transparent; color: var(--text-muted);
    font-family: var(--font); transition: all 0.2s;
  }
  .btn-toggle:hover { border-color: var(--red); color: var(--red); }
  .btn-toggle.reactivar:hover { border-color: var(--green); color: var(--green); }

  .empty-state {
    text-align: center; padding: 2rem;
    color: var(--text-muted); font-size: 14px;
  }

  .spinner {
    width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,0.2);
    border-top-color: white;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to{transform:rotate(360deg)} }

  @media (max-width: 520px) {
    .form-row { grid-template-columns: 1fr; }
    th:nth-child(3), td:nth-child(3),
    th:nth-child(5), td:nth-child(5) { display: none; }
  }
</style>
</head>
<body>
<div class="container">

  <div class="top-bar">
    <div class="brand">
      <div class="brand-dot"></div>
      Simulador Examen Teórico
    </div>
    <span class="admin-badge">⚙ Panel admin</span>
  </div>

  <h1>Gestión de alumnos</h1>
  <p class="page-sub">Registra un alumno y obtén su código de acceso al instante.</p>

  <!-- FORMULARIO -->
  <div class="form-card">
    <div class="form-row">
      <div class="form-group">
        <label>Nombre completo *</label>
        <input id="inp-nombre" type="text" placeholder="Ej: María García" autocomplete="off">
      </div>
      <div class="form-group">
        <label>WhatsApp (con indicativo)</label>
        <input id="inp-tel" type="tel" placeholder="573167511797">
      </div>
    </div>
    <div class="form-row">
      <div class="form-group full">
        <label>Acceso a niveles</label>
        <select id="inp-nivel">
          <option value="0">Solo nivel inicial</option>
          <option value="1">Inicial + Práctica</option>
          <option value="2">Todos los niveles</option>
        </select>
      </div>
    </div>
    <button class="btn-generate" id="btn-generar" onclick="generarAcceso()">
      <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg>
      Generar acceso
    </button>
  </div>

  <!-- RESULTADO -->
  <div class="result-box" id="result-box">
    <div class="result-label">✓ Alumno registrado</div>
    <div class="result-name" id="res-nombre"></div>
    <div class="token-display">
      <span class="token-code" id="res-token"></span>
      <button class="btn-copy" onclick="copiarToken()">Copiar código</button>
    </div>
    <div class="msg-template" id="msg-template"></div>
    <button class="btn-whatsapp" id="btn-whatsapp" onclick="enviarWhatsApp()">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
      Enviar por WhatsApp
    </button>
  </div>

  <!-- TABLA -->
  <div class="table-header">
    <span class="table-title">Alumnos registrados</span>
    <button class="btn-refresh" onclick="cargarAlumnos()">
      <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M23 4v6h-6M1 20v-6h6"/><path d="M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
      Actualizar
    </button>
  </div>
  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th>Nombre</th>
          <th>Código</th>
          <th>Nivel</th>
          <th>Estado</th>
          <th>Acción</th>
        </tr>
      </thead>
      <tbody id="tabla-body">
        <tr><td colspan="5" class="empty-state">Cargando...</td></tr>
      </tbody>
    </table>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://tmnoziwwmvolduzbhzoo.supabase.co';
const SUPABASE_KEY = 'sb_publishable_kyKZKsVe03Lstv7MJCFneQ_qvs2Z9QF';
const SIMULADOR_URL = 'https://simulador-examen-conduccion.netlify.app';

async function sbGet(tabla, filtros = '') {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}?${filtros}`, {
    headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
  });
  return r.json();
}

async function sbPost(tabla, body) {
  const r = await fetch(`${SUPABASE_URL}/rest/v1/${tabla}`, {
    method: 'POST',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=representation'
    },
    body: JSON.stringify(body)
  });
  return r.json();
}

async function sbPatch(tabla, filtro, body) {
  await fetch(`${SUPABASE_URL}/rest/v1/${tabla}?${filtro}`, {
    method: 'PATCH',
    headers: {
      'apikey': SUPABASE_KEY,
      'Authorization': `Bearer ${SUPABASE_KEY}`,
      'Content-Type': 'application/json',
      'Prefer': 'return=minimal'
    },
    body: JSON.stringify(body)
  });
}

function generarTokenAleatorio(nombre) {
  const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
  // Tomar hasta 2 iniciales del nombre
  const partes = nombre.trim().split(' ').filter(w => w.length > 0);
  let prefix = '';
  for (const p of partes) {
    if (prefix.length < 2) prefix += p[0].toUpperCase();
  }
  prefix = prefix.padEnd(2, 'X');
  // Completar hasta 4 chars con aleatorios
  while (prefix.length < 4) {
    prefix += chars[Math.floor(Math.random() * chars.length)];
  }
  // Generar 4 chars aleatorios para el sufijo
  let suffix = '';
  for (let i = 0; i < 4; i++) {
    suffix += chars[Math.floor(Math.random() * chars.length)];
  }
  return `${prefix}-${suffix}`;
}

async function generarAcceso() {
  const nombre = document.getElementById('inp-nombre').value.trim();
  if (!nombre) {
    document.getElementById('inp-nombre').focus();
    return;
  }

  const btn = document.getElementById('btn-generar');
  btn.disabled = true;
  btn.innerHTML = '<div class="spinner"></div> Generando...';

  try {
    // 1. Crear alumno
    const tel = document.getElementById('inp-tel').value.trim().replace(/[^0-9]/g, '');
    const alumnoResp = await sbPost('alumnos', {
      nombre,
      email: null,
      telefono: tel || null
    });

    if (!alumnoResp || !alumnoResp[0]?.id) throw new Error('Error creando alumno');
    const alumnoId = alumnoResp[0].id;

    // 2. Generar token único
    let token = generarTokenAleatorio(nombre);
    const nivelAcceso = parseInt(document.getElementById('inp-nivel').value);

    // 3. Crear token
    await sbPost('tokens', {
      token,
      alumno_id: alumnoId,
      activo: true,
      nivel_actual: 0,
      nivel_maximo: nivelAcceso
    });

    // 4. Mostrar resultado
    const telNum = document.getElementById('inp-tel').value.trim().replace(/[^0-9]/g, '');
    document.getElementById('res-nombre').textContent = nombre;
    document.getElementById('res-token').textContent = token;

    const msg = `Hola ${nombre.split(' ')[0]} 👋\n\nTu acceso al Simulador de Tránsito está listo.\n\n🔗 Enlace: ${SIMULADOR_URL}\n🔑 Tu código: ${token}\n\nIngresa el código exactamente como aparece. ¡Éxitos!`;
    document.getElementById('msg-template').innerHTML = msg.replace(/\n/g, '<br>');
    document.getElementById('msg-template').dataset.raw = msg;
    document.getElementById('msg-template').dataset.tel = telNum;

    const btnWA = document.getElementById('btn-whatsapp');
    if (telNum) {
      btnWA.style.display = 'flex';
      btnWA.dataset.tel = telNum;
      btnWA.dataset.msg = msg;
    } else {
      btnWA.style.display = 'none';
    }

    document.getElementById('result-box').classList.add('show');
    document.getElementById('result-box').scrollIntoView({ behavior: 'smooth' });

    // Limpiar form
    document.getElementById('inp-nombre').value = '';
    document.getElementById('inp-tel').value = '';

    // Recargar tabla
    cargarAlumnos();

  } catch(e) {
    alert('Error: ' + e.message);
  }

  btn.disabled = false;
  btn.innerHTML = '<svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 5v14M5 12h14"/></svg> Generar acceso';
}

function copiarToken() {
  const token = document.getElementById('res-token').textContent;
  navigator.clipboard.writeText(token);
  const btn = event.target;
  btn.textContent = '¡Copiado!';
  setTimeout(() => btn.textContent = 'Copiar código', 2000);
}

function enviarWhatsApp() {
  const btn = document.getElementById('btn-whatsapp');
  const tel = btn.dataset.tel;
  const msg = btn.dataset.msg;
  const url = `https://wa.me/${tel}?text=${encodeURIComponent(msg)}`;
  window.open(url, '_blank');
}

const NIVELES = ['Inicial', 'Práctica', 'Final', 'Completo'];

async function cargarAlumnos() {
  const tbody = document.getElementById('tabla-body');
  tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Cargando...</td></tr>';

  try {
    const data = await sbGet('tokens', 'select=*,alumnos(nombre)&order=created_at.desc&limit=50');

    if (!data || data.length === 0) {
      tbody.innerHTML = '<tr><td colspan="5" class="empty-state">No hay alumnos registrados aún.</td></tr>';
      return;
    }

    tbody.innerHTML = data.map(t => {
      const nombre = t.alumnos?.nombre || '—';
      const nivel = Math.min(t.nivel_actual || 0, 3);
      const activo = t.activo;
      return `
        <tr>
          <td class="td-nombre">${nombre}</td>
          <td class="td-token">${t.token}</td>
          <td><span class="nivel-badge nivel-${nivel}">${NIVELES[nivel]}</span></td>
          <td>
            <span class="activo-dot ${activo ? 'activo-si' : 'activo-no'}"></span>
            ${activo ? 'Activo' : 'Inactivo'}
          </td>
          <td>
            <button class="btn-toggle ${activo ? '' : 'reactivar'}"
              onclick="toggleToken('${t.id}', ${activo})">
              ${activo ? 'Desactivar' : 'Reactivar'}
            </button>
          </td>
        </tr>`;
    }).join('');
  } catch(e) {
    tbody.innerHTML = '<tr><td colspan="5" class="empty-state">Error cargando datos.</td></tr>';
  }
}

async function toggleToken(id, activo) {
  await sbPatch('tokens', `id=eq.${id}`, { activo: !activo });
  cargarAlumnos();
}

// Cargar al inicio
cargarAlumnos();
</script>
</body>
</html>
